name: Vercel Preview for Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL: "1"

      - name: Deploy to Vercel
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})"
          printf 'url=%s\n' "$url" >> "$GITHUB_OUTPUT"

      - name: Alias preview domain
        id: alias
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          slug="$(printf '%s' "$BRANCH_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"

          if [ -z "$slug" ]; then
            slug="pr-$PR_NUMBER"
          fi

          slug="$(printf '%.63s' "$slug" | sed -E 's/-+$//')"

          if [ -z "$slug" ]; then
            slug="pr-$PR_NUMBER"
          fi

          domain="$slug.leafspots.preview.nntin.xyz"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$domain" --token="$VERCEL_TOKEN"

          printf 'domain=%s\n' "$domain" >> "$GITHUB_OUTPUT"
          printf 'url=%s\n' "https://$domain" >> "$GITHUB_OUTPUT"

      - name: Upsert preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-url -->';
            const body = `${marker}\n🔍 Vercel Preview: ${{ steps.alias.outputs.url }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
